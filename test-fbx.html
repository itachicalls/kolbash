<!DOCTYPE html>
<html>
<head>
  <title>FBX Loading Test</title>
  <style>
    body { margin: 0; background: #111; color: #0f0; font-family: monospace; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 100; white-space: pre-wrap; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="info">Loading FBX test...</div>
  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const info = document.getElementById('info');
    function log(msg) {
      console.log(msg);
      info.textContent += '\n' + msg;
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222233);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(hemi);
    
    const dir = new THREE.DirectionalLight(0xffffff, 1);
    dir.position.set(5, 10, 5);
    dir.castShadow = true;
    scene.add(dir);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid
    scene.add(new THREE.GridHelper(20, 20));

    // Axes helper
    scene.add(new THREE.AxesHelper(3));

    // Animation mixer storage
    let mixer = null;
    let clock = new THREE.Clock();

    // FBX Loader
    const loader = new FBXLoader();

    const models = [
      '/models/alon_dancing.fbx',
      '/models/slingoor_dance.fbx'
    ];

    let currentModelIndex = 0;

    function loadModel(path) {
      log(`\n========================================`);
      log(`Loading: ${path}`);
      
      loader.load(
        path,
        (fbx) => {
          log(`✓ FBX loaded successfully!`);
          
          // Clear previous model
          scene.children.forEach(child => {
            if (child.userData.isLoadedModel) {
              scene.remove(child);
            }
          });

          fbx.userData.isLoadedModel = true;

          // Log structure
          log(`\nModel structure:`);
          log(`- Name: ${fbx.name}`);
          log(`- Type: ${fbx.type}`);
          log(`- Children: ${fbx.children.length}`);
          
          // Compute bounding box BEFORE any transforms
          const box = new THREE.Box3().setFromObject(fbx);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          
          log(`\nOriginal bounds:`);
          log(`- Size: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}`);
          log(`- Center: ${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)}`);
          log(`- Min Y: ${box.min.y.toFixed(2)}`);
          log(`- Max Y: ${box.max.y.toFixed(2)}`);
          
          // Calculate scale to make model ~2 units tall
          const targetHeight = 2;
          const scaleFactor = targetHeight / size.y;
          log(`\nScale factor: ${scaleFactor.toFixed(4)} (to reach ${targetHeight} units)`);
          
          fbx.scale.setScalar(scaleFactor);
          
          // Recalculate bounds after scaling
          const newBox = new THREE.Box3().setFromObject(fbx);
          const newSize = newBox.getSize(new THREE.Vector3());
          const newCenter = newBox.getCenter(new THREE.Vector3());
          
          log(`\nAfter scaling:`);
          log(`- Size: ${newSize.x.toFixed(2)} x ${newSize.y.toFixed(2)} x ${newSize.z.toFixed(2)}`);
          
          // Position model so feet are on ground
          fbx.position.y = -newBox.min.y;
          
          // Center horizontally
          fbx.position.x = -newCenter.x;
          fbx.position.z = -newCenter.z;
          
          log(`- Position: ${fbx.position.x.toFixed(2)}, ${fbx.position.y.toFixed(2)}, ${fbx.position.z.toFixed(2)}`);
          
          // Count and log meshes
          let meshCount = 0;
          let skinnedMeshCount = 0;
          let boneCount = 0;
          
          fbx.traverse((child) => {
            if (child.isMesh) {
              meshCount++;
              child.castShadow = true;
              child.receiveShadow = true;
              
              // Log material info
              if (child.material) {
                const mat = child.material;
                log(`  Mesh: ${child.name} - Material: ${mat.type}`);
              }
            }
            if (child.isSkinnedMesh) {
              skinnedMeshCount++;
            }
            if (child.isBone) {
              boneCount++;
            }
          });
          
          log(`\nMesh count: ${meshCount}`);
          log(`Skinned meshes: ${skinnedMeshCount}`);
          log(`Bones: ${boneCount}`);
          
          // Animations
          log(`\nAnimations: ${fbx.animations ? fbx.animations.length : 0}`);
          
          if (fbx.animations && fbx.animations.length > 0) {
            fbx.animations.forEach((clip, i) => {
              log(`  [${i}] "${clip.name}" - ${clip.duration.toFixed(2)}s, ${clip.tracks.length} tracks`);
            });
            
            // Setup animation mixer
            mixer = new THREE.AnimationMixer(fbx);
            const action = mixer.clipAction(fbx.animations[0]);
            action.play();
            log(`\n▶ Playing animation: ${fbx.animations[0].name}`);
          } else {
            mixer = null;
            log(`\n⚠ No animations found!`);
          }
          
          scene.add(fbx);
          
          // Adjust camera to see model
          camera.position.set(0, newSize.y, newSize.y * 2.5);
          controls.target.set(0, newSize.y / 2, 0);
          controls.update();
          
          log(`\n✓ Model added to scene!`);
          log(`========================================`);
        },
        (progress) => {
          if (progress.total > 0) {
            const pct = (progress.loaded / progress.total * 100).toFixed(0);
            log(`Loading: ${pct}%`);
          }
        },
        (error) => {
          log(`\n✗ ERROR loading FBX:`);
          log(error.message || error);
          console.error('Full error:', error);
        }
      );
    }

    // Load first model
    loadModel(models[currentModelIndex]);

    // Click to switch models
    document.addEventListener('click', () => {
      currentModelIndex = (currentModelIndex + 1) % models.length;
      loadModel(models[currentModelIndex]);
    });

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      
      const delta = clock.getDelta();
      
      if (mixer) {
        mixer.update(delta);
      }
      
      controls.update();
      renderer.render(scene, camera);
    }
    
    animate();

    log('\n[Click anywhere to switch between models]');
  </script>
</body>
</html>
